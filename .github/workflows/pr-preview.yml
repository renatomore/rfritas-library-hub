name: PR Preview

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  build-preview:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Lint code
      run: npm run lint
      
    - name: Build for preview
      run: npm run build
      
    - name: Comment PR
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.PAT || github.token }}
        script: |
          try {
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 **Preview Build Successful!** \n\nYour changes have been built successfully and are ready for review. \n\n✅ Lint passed \n✅ Build completed \n\nOnce merged to `main`, these changes will be automatically deployed to GitHub Pages.'
            });
            console.log('✅ PR comment created successfully');
          } catch (error) {
            console.log('⚠️ Failed to create PR comment:', error.message);
            console.log('This is usually due to insufficient permissions.');
            console.log('Consider adding a PAT secret for enhanced functionality.');
            // Don't fail the workflow if commenting fails
          }